name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          uv run --python 3.11 python - <<'PY'
          import os
          import sys
          import tomllib

          tag_version = os.environ['GITHUB_REF_NAME'].removeprefix('v')
          with open('pyproject.toml', 'rb') as pyproject:
              package_version = tomllib.load(pyproject)['project']['version']

          if tag_version != package_version:
              sys.exit(
                  f'Tag version {tag_version} does not match '
                  f'pyproject.toml version {package_version}.'
              )
          PY

      - name: Run tests
        run: |
          if [ -d tests ]; then
            uv run --python 3.11 --with pytest pytest
          else
            echo "No tests directory found; skipping pytest."
          fi

      - name: Clean build artifacts
        run: rm -rf dist

      - name: Build package
        run: uv build --sdist --wheel

      - name: Verify package
        run: uvx --from twine twine check dist/*

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
